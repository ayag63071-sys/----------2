<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اختبار الفصل الأول - تأخر الكلام | 50 سؤالاً بصعوبة خارقة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* الوضع المظلم (الافتراضي) مع أمواج وخلفيات متدرجة */
        :root {
            --bg-gradient: radial-gradient(circle at 10% 30%, #0a0f1e, #0b1120, #111827);
            --wave-gradient: linear-gradient(120deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.15), rgba(59, 130, 246, 0.2));
            --glass-bg: rgba(15, 25, 45, 0.55);
            --glass-border: rgba(255, 255, 255, 0.2);
            --card-bg: rgba(20, 30, 55, 0.65);
            --text-primary: #f0f3fa;
            --text-secondary: #cbd5e1;
            --accent: #c084fc;
            --accent-glow: #a855f7;
            --success: #4ade80;
            --error: #f87171;
            --btn-check: #8b5cf6;
            --shadow: 0 25px 40px -12px rgba(0,0,0,0.6);
            --wave-overlay: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(139,92,246,0.1)" fill-opacity="0.4" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,186.7C672,192,768,224,864,229.3C960,235,1056,213,1152,192C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
        }

        body.light {
            --bg-gradient: radial-gradient(circle at 80% 20%, #eef2ff, #dfe9ff, #ffffff);
            --wave-gradient: linear-gradient(145deg, rgba(124, 58, 237, 0.2), rgba(236, 72, 153, 0.1), rgba(129, 140, 248, 0.2));
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(100, 100, 150, 0.25);
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-primary: #1e1b4b;
            --text-secondary: #334155;
            --accent: #7c3aed;
            --accent-glow: #6d28d9;
            --btn-check: #7c3aed;
            --shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Tahoma', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 30px 20px;
            transition: background 0.5s ease, color 0.3s ease;
            position: relative;
            overflow-x: hidden;
        }

        /* أمواج SVG متحركة في الخلفية */
        body::before {
            content: "";
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 220px;
            background: var(--wave-gradient);
            mask: var(--wave-overlay) no-repeat bottom;
            -webkit-mask: var(--wave-overlay) no-repeat bottom;
            background-size: cover;
            opacity: 0.65;
            pointer-events: none;
            z-index: 0;
            animation: subtleWaveMove 12s infinite alternate ease-in-out;
        }

        @keyframes subtleWaveMove {
            0% { transform: translateX(0) scaleX(1); opacity: 0.5; }
            100% { transform: translateX(3%) scaleX(1.02); opacity: 0.8; }
        }

        /* زر التبديل بين الوضعين بأيقونة أنيقة */
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 10px 24px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }

        .theme-toggle:hover {
            transform: scale(0.96);
            background: var(--accent);
            color: white;
            border-color: rgba(255,255,255,0.5);
        }

        /* الحاوية الزجاجية الرئيسية مع تأثير تموج */
        .glass-container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 30px 28px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            animation: fadeInUp 0.7s ease-out;
            position: relative;
            z-index: 2;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-size: 2.1rem;
            background: linear-gradient(135deg, var(--accent), #e0b3ff, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .sub {
            text-align: center;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* عداد الأسئلة والنتيجة */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(8px);
            padding: 12px 28px;
            border-radius: 80px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .progress {
            font-weight: bold;
            background: linear-gradient(95deg, var(--accent), #a855f7);
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            color: white;
        }

        .score-badge {
            font-size: 1.25rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f0f3fa, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* بطاقة السؤال - زجاجية شيك وحدود متلألئة */
        .question-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 38px;
            padding: 22px 28px;
            margin-bottom: 28px;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: slideIn 0.45s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-18px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .question-card:hover {
            border-color: var(--accent);
            box-shadow: 0 12px 28px rgba(139, 92, 246, 0.3);
            transform: translateY(-3px);
        }

        .q-header {
            display: flex;
            gap: 16px;
            align-items: baseline;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .q-num {
            background: linear-gradient(145deg, var(--accent), #7c3aed);
            color: white;
            padding: 5px 18px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }

        .q-text {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .options-list {
            list-style: none;
            margin-bottom: 22px;
        }

        .options-list li {
            background: rgba(0, 0, 0, 0.25);
            margin-bottom: 12px;
            padding: 12px 20px;
            border-radius: 60px;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            transition: all 0.25s;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .options-list li::before {
            content: "✨";
            font-size: 1rem;
            opacity: 0.7;
        }

        body.light .options-list li::before {
            content: "⭐";
        }

        .options-list li:hover:not(.disabled-opt) {
            background: var(--accent);
            color: white;
            transform: scale(0.97);
            border-color: white;
        }

        .options-list li.selected {
            background: var(--accent);
            border-color: white;
            color: white;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .options-list li.disabled-opt {
            cursor: default;
            opacity: 0.6;
        }

        /* زر check أنيق مع أيقونة */
        .check-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 12px;
        }

        .check-btn {
            background: linear-gradient(125deg, var(--btn-check), #a855f7, #c084fc);
            border: none;
            padding: 10px 36px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 4px 14px rgba(168, 85, 247, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .check-btn::before {
            content: "✔️";
            font-size: 1rem;
        }

        .check-btn:hover {
            transform: scale(0.96);
            box-shadow: 0 0 24px var(--accent-glow);
            background: linear-gradient(125deg, #a855f7, #d946ef);
        }

        .feedback {
            font-size: 0.85rem;
            padding: 7px 22px;
            border-radius: 40px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
        }

        .fb-correct {
            color: var(--success);
            border-right: 4px solid var(--success);
        }
        .fb-wrong {
            color: var(--error);
            border-right: 4px solid var(--error);
        }
        .fb-neutral {
            color: var(--accent);
        }

        /* التقييم الشامل في النهاية */
        .final-evaluation {
            margin-top: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 28px;
            text-align: center;
            border: 2px solid var(--accent);
            transition: 0.3s;
            animation: glowPulse 2s infinite alternate;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 8px rgba(192,132,252,0.3); border-color: var(--accent);}
            100% { box-shadow: 0 0 28px rgba(168,85,247,0.6); border-color: #e879f9;}
        }

        .final-evaluation h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .eval-grade {
            font-size: 2.8rem;
            font-weight: bold;
            background: linear-gradient(145deg, var(--accent), #f0abfc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 12px 0;
        }

        .eval-message {
            font-size: 1rem;
            line-height: 1.6;
        }

        .reset-btn {
            background: linear-gradient(95deg, #facc15, #f59e0b);
            border: none;
            padding: 12px 36px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 22px;
            color: #1e1b4b;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .reset-btn::before {
            content: "🔄";
        }

        .reset-btn:hover {
            transform: scale(0.96);
            background: linear-gradient(95deg, #fbbf24, #ea580c);
            box-shadow: 0 6px 18px rgba(245,158,11,0.5);
        }

        footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.8;
        }

        @media (max-width: 700px) {
            .glass-container { padding: 16px; }
            .q-text { font-size: 0.95rem; }
            .check-btn { padding: 6px 22px; }
        }
    </style>
</head>
<body>
<button class="theme-toggle" id="themeSwitcher">🌙✨ وضع فاتح / مظلم</button>

<div class="glass-container">
    <h1>🧠 تأخر الكلام | الفصل الأول 🔥</h1>
    <div class="sub"></div>

    <div class="stats-bar">
        <span class="progress" id="answeredCounter">📋 تم الإجابة: 0 / 50</span>
        <span class="score-badge" id="liveScore">🏆 النتيجة: 0</span>
    </div>

    <div id="questionsArea"></div>

    <div id="finalEvaluation" class="final-evaluation" style="display: none;">
        <h3>📊 التقييم الشامل</h3>
        <div class="eval-grade" id="finalGrade"></div>
        <div class="eval-message" id="finalMessage"></div>
        <button class="reset-btn" id="globalReset">🔄 بدء اختبار جديد</button>
    </div>
    <footer>aya gaber</footer>
</div>

<script>
    // ************** 50 سؤالاً (فائقة الصعوبة) **************
    const questions = [
        { text: "أي من الآتي يعبر بدقة عن مفهوم 'النظام' في تعريف اللغة وفقًا للمحتوى؟", options: ["مجموعة من الرموز العشوائية", "قوانين تحكم سير اللغة وتظهر التناسق بين مكوناتها", "مجرد عادة اجتماعية بدون قواعد", "الأصوات فقط دون ترتيب"], correct: 1 },
        { text: "المستوى الذي يدرس 'البناء الداخلي للكلمات' والأوزان والجذور يسمى:", options: ["الفونولوجيا", "المورفولوجيا (الصرف)", "البراجماتيك", "السيمانتيك"], correct: 1 },
        { text: "أي العبارات تمثل السمة 'ازدواجية النظام' في خصائص اللغة؟", options: ["اللغة لها بناء سطحي وآخر عميق", "اللغة تعتمد على الحواس فقط", "اللغة مقتصرة على المفردات", "اللغة فردية محكومة"], correct: 0 },
        { text: "منطقة بروكا عند تلفها تؤدي إلى:", options: ["حبسة طلاقة مع فقدان المعنى", "حبسة تعبيرية غير طليقة مع صعوبة في إنتاج الكلام", "فقدان السمع المركزي", "عمه بصري"], correct: 1 },
        { text: "حسب النص، أي نوع من الحبسة يظهر فيه المريض كلامًا طليقًا لكن خاليًا من المعنى مع ضعف شديد في الفهم؟", options: ["حبسة بروكا", "حبسة فيرنيك", "حبسة توصيلية", "حبسة شاملة"], correct: 1 },
        { text: "نظرية 'الفترة الحرجة' تشير إلى أن إصابة الفص الأيسر قبل البلوغ:", options: ["تؤدي إلى فقدان دائم للغة", "يمكن تعويضها بنقل المراكز للفص الأيمن", "تؤثر فقط على الذاكرة", "تسبب عيوب نطق بسيطة"], correct: 1 },
        { text: "أي من المحكات التالية يعتبر مؤشراً خطيراً لتأخر الكلام في عمر 18 شهرًا؟", options: ["عدم استخدام الإيماءات", "عدم نطق كلمات بسيطة", "عدم المشي", "عدم التفاعل البصري"], correct: 1 },
        { text: "مرحلة 'الجملة المكونة من كلمتين' تتسم بـ:", options: ["لغة برقية (Telegraphic) بحذف الكلمات الوظيفية", "جمل نحوية كاملة", "استخدام الضمائر بكثرة", "الاعتماد على الأفعال فقط"], correct: 0 },
        { text: "أي مستوى من مستويات اللغة يهتم بمناسبة استخدام الكلمات في المواقف والمشاركين؟", options: ["المستوى الدلالي", "المستوى الوظيفي (البراجماتيك)", "المستوى الصرفي", "المستوى الصوتي"], correct: 1 },
        { text: "الذاكرة السمعية كما وردت في إجراءات التشخيص تقيس:", options: ["قدرة الطفل على تذكر المثيرات السمعية وتكرارها", "قدرة الطفل على القراءة", "فهم القصص الطويلة", "التمييز بين الألوان"], correct: 0 },
        { text: "منطقة فيرنيك تقع في:", options: ["الفص الجبهي", "الفص الصدغي بالقرب من القشرة السمعية", "المخيخ", "جذع الدماغ"], correct: 1 },
        { text: "أي النظريات التالية ترى أن اللغة تنمو من خلال التفاعل الاجتماعي والرغبة في التواصل مع التأكيد على الخبرات؟", options: ["النظرية الفطرية", "النظرية السلوكية", "نظرية التفاعل الاجتماعي", "النظرية البنوية"], correct: 2 },
        { text: "أي العوامل التالية وفق النص تؤثر في تأخر الكلام وتتعلق بترتيب الطفل في الأسرة؟", options: ["العوامل الأسرية (الطفل الوحيد أكثر ثراء لغويًا)", "ضعف السمع", "الفروق بين الجنسين", "المشكلات النفسية"], correct: 0 },
        { text: "في مرحلة 'المناغاة المكررة' (25-50 أسبوعًا) تظهر:", options: ["جمل من ثلاث كلمات", "مقاطع مكررة مثل (بابا، ماما)", "صيحات غضب فقط", "كلمات معقدة"], correct: 1 },
        { text: "أي أنواع الحبسة الكلامية تنتج عن تلف الحزمة العصبية الواصلة بين بروكا وفيرنيك مع صعوبة في التكرار؟", options: ["حبسة بروكا", "حبسة فيرنيك", "الحبسة التوصيلية", "حبسة التسمية"], correct: 2 },
        { text: "وظيفة اللغة 'التنظيمية' تعني:", options: ["مساعدة الفرد على إشباع حاجاته", "تنظيم وترتيب أولويات الأفعال المرغوبة", "التعبير عن الإنتاج الأدبي", "استكشاف البيئة"], correct: 1 },
        { text: "أي المكونات التالية ليس جزءًا من الجهاز الكلامي المحيطي وفق النص؟", options: ["الحجاب الحاجز", "اللسان", "منطقة فيرنيك", "الشفتان"], correct: 2 },
        { text: "من سمات الطفل المتأخر لغوياً اجتماعياً:", options: ["العدوانية والانسحاب أحياناً", "حب تكوين صداقات مع كبار السن", "الكلام بطلاقة", "التفاعل العالي"], correct: 0 },
        { text: "أداة 'المقابلة الأولية' في التشخيص تشمل:", options: ["استمارة بيانات عن تاريخ الطفل المرضى والأسري", "اختبار سمع فقط", "تحليل العينة الصوتية فقط", "قياس نسبة الذكاء فقط"], correct: 0 },
        { text: "مرحلة 'الكلمة جملة' تعني أن الطفل:", options: ["يستخدم كلمة واحدة للتعبير عن جملة كاملة بالسياق", "ينطق 10 كلمات في الدقيقة", "يستخدم إشارات معقدة", "يحفظ القصائد"], correct: 0 },
        { text: "حبسة التسمية (Anomic aphasia) تتصف بـ:", options: ["عدم القدرة على تسمية الأشياء مع معرفة وظيفتها", "فقدان الطلاقة تمامًا", "كلام فارغ تمامًا", "ضعف سمعي شديد"], correct: 0 },
        { text: "أي من التالي يُعد نقدًا قويًا للاتجاه السلوكي في تفسير اكتساب اللغة؟", options: ["عدم تفسير الإبداع اللغوي وإنتاج جمل جديدة لم تُسمع", "التركيز على الفطرة", "تجاهل التعزيز", "الاهتمام بالمعاني فقط"], correct: 0 },
        { text: "الجهاز العضلي الذي يفصل بين الصدر والبطن ويتحكم في عملية الزفير أثناء الكلام:", options: ["الحنجرة", "الحجاب الحاجز", "اللسان", "البلعوم"], correct: 1 },
        { text: "من العوامل البيئية المؤثرة إيجابًا في النمو اللغوي:", options: ["بيئة غنية بالمثيرات الثقافية والتلفاز الهادف والكتب", "العزلة", "الحرمان من التعزيز", "غياب النماذج اللغوية"], correct: 0 },
        { text: "اختبار 'المتابعة اللفظية' (verbal sequencing) يستخدم لجمع عينات لغوية من خلال:", options: ["طلب ترديد أيام الأسبوع أو أشهر السنة", "فحص عضلات النطق", "قياس الذاكرة البصرية", "اختبار الفهم"], correct: 0 },
        { text: "أي من الآتي يعتبر من مستويات اللغة حسب التقسيم السداسي (الصوتي، الفونولوجي، الصرفي، النحوي، الدلالي، .....)؟", options: ["الوظيفي (البراجماتيك)", "اللغوي الحركي", "الإيقاعي", "الترديدي"], correct: 0 },
        { text: "منطقة فيرنيك مسؤولة بشكل أساسي عن:", options: ["فهم وتفسير اللغة واستقبال النبضات السمعية", "إنتاج الكلام الحركي", "تنظيم التوازن", "تنسيق عضلات الوجه"], correct: 0 },
        { text: "أي العوامل التالية تزيد من صعوبة تشخيص التأخر اللغوي؟", options: ["التداخل بين صعوبات النطق والتأخر اللغوي", "وضوح الأعراض دائمًا", "سهولة قياس القدرات العقلية", "قلة الأدوات"], correct: 0 },
        { text: "في مرحلة ما قبل المدرسة (4-5 سنوات) يستطيع الطفل:", options: ["استخدام جمل معقدة وسرد قصص بسيطة", "نطق صوت واحد فقط", "الكتابة بطلاقة", "فهم النظريات المجردة"], correct: 0 },
        { text: "الوظيفة 'الأخبارية' للغة تعني:", options: ["نقل المعلومات الجديدة وتوصيلها للأجيال", "التعبير عن المشاعر", "اللعب بالألفاظ", "طلب الطعام"], correct: 0 },
        { text: "أي من اضطرابات اللغة التطورية يظهر فيه الطفل ذو قواعد خاصة به وثابتة عند مستوى معين؟", options: ["اضطراب الكفاءة اللغوية", "عدم نمو اللغة اللفظية", "التأخر اللغوي البسيط", "الحبسة المكتسبة"], correct: 0 },
        { text: "ما الذي تقيسه اختبارات 'الذاكرة السمعية قصيرة المدى' في تقييم تأخر الكلام؟", options: ["قدرة الطفل على تذكر الأرقام وتكرار الجمل", "فهم النصوص الطويلة", "التمييز بين الأصوات", "المهارات البصرية"], correct: 0 },
        { text: "من أهم إنجازات مرحلة 'اللغة الخاصة' (1-2.5 سنة) أن الطفل:", options: ["يبدل الحروف الصعبة بأسهل (مثل تتاب بدلاً من كتاب)", "يستخدم جملًا طويلة", "يقرأ الكلمات", "يكتب حروف الهجاء"], correct: 0 },
        { text: "أي من مستويات اللغة يتعلق بدراسة 'معاني المفردات والعلاقات بينها (الترادف، التضاد، تعدد المعاني)'؟", options: ["المستوى الدلالي", "المستوى الصرفي", "المستوى الفونولوجي", "المستوى النحوي"], correct: 0 },
        { text: "بحسب النص، أي العبارات تصف 'اللغة الاستقبالية'؟", options: ["المفردات الداخلية التي يفهمها الطفل بدون نطق والإشارات", "الكلمات المنطوقة فقط", "الكتابة", "النطق السريع"], correct: 0 },
        { text: "أي من الحالات التالية تعتبر 'حبسة كلية (شاملة)'؟", options: ["عجز شديد في جميع الوظائف اللغوية (فهم وإنتاج)", "فقدان التسمية فقط", "ضعف في منطقة بروكا فقط", "ضعف في الذاكرة البصرية"], correct: 0 },
        { text: "أداة 'المقياس الفونولوجي' في التشخيص تهتم بـ:", options: ["تحليل أنماط الأصوات وقواعدها", "قياس نسبة الذكاء", "المهارات الحركية الكبرى", "الجوانب الاجتماعية"], correct: 0 },
        { text: "من الانتقادات الموجهة للاختبارات المعيارية المرجعية في التقييم اللغوي:", options: ["مقارنة الطفل بعينة معيارية قد لا تعكس قدراته الفردية", "سهولة تطبيقها دائمًا", "عدم وجود درجات", "طول وقتها"], correct: 0 },
        { text: "أي من العوامل التالية وفق النص قد يسبب تأخرًا لغويًا نفسي المنشأ؟", options: ["فصام الطفولة والانسحاب", "ضعف السمع الخلقي", "الشفة الأرنبية", "الحوادث"], correct: 0 },
        { text: "في فسيولوجيا الكلام، وظيفة 'الحنجرة' الأساسية:", options: ["احتواء الأوتار الصوتية وإنتاج الصوت الأولي", "تنفس الهواء فقط", "المضغ", "البلع"], correct: 0 },
        { text: "أي نوع من الحبسة يحدث بسبب عزل منطقة فيرنيك عن بقية المخ مع بقاء الطلاقة؟", options: ["الحبسة الحسية المعزولة", "حبسة بروكا", "حبسة التوصيل", "حبسة التسمية"], correct: 0 },
        { text: "من مهارات 'التدريب الفسيولوجي' لأعضاء الجهاز الكلامي:", options: ["تدريبات المضغ والنفخ والمص وتقوية عضلات الفم", "حل المسائل الرياضية", "القراءة الصامتة", "الاستماع للموسيقى"], correct: 0 },
        { text: "أي العوامل يسهم في زيادة الحصيلة اللغوية وفق النص؟", options: ["التعزيز الإيجابي من الوالدين والمثيرات الثقافية", "العزلة التامة", "غياب النماذج الكلامية", "الحرمان اللغوي"], correct: 0 },
        { text: "الاختلاف بين 'التأخر اللغوي' و'العجز اللغوي' أن التأخر يعني:", options: ["نمو لغوي بطيء ولكن بنفس تسلسل الطبيعي", "نمو غير طبيعي تمامًا", "فقدان اللغة بعد اكتسابها", "عيوب نطق فقط"], correct: 0 },
        { text: "مرحلة 'التوقف عن النشاط استجابة لحديث الكبار' تظهر في أي فئة عمرية وفق نموذج التقييم؟", options: ["6-12 شهر", "منذ الولادة", "3-5 سنوات", "12-18 شهر"], correct: 0 },
        { text: "أي من الآتي يعتبر مؤشرًا على مشكلة في 'البراجماتيك' (الاستخدام الوظيفي)؟", options: ["عدم قدرة الطفل على تغيير أسلوب حديثه حسب الموقف والمستمع", "ضعف نطق حرف الراء", "قلة عدد الكلمات", "صعوبة في تركيب الجمل"], correct: 0 },
        { text: "اختبار 'العميق للنطق' لماكدونالد يهتم بـ:", options: ["السياقات الصوتية المتداخلة وتأثير الأصوات المجاورة", "قياس الفهم فقط", "الذاكرة طويلة المدى", "المهارات الحركية"], correct: 0 },
        { text: "أي من التالي يعد هدفًا من أهداف التدريب على 'الانتباه' في برامج المتأخرين لغوياً؟", options: ["تنمية استجابات الطفل لحركات الأخصائي وبناء علاقة", "زيادة سرعة الكلام", "التركيز على الأخطاء فقط", "إهمال التواصل"], correct: 0 },
        { text: "وفقًا للنص، الحبسة التي تنتج عن إصابة واسعة في نصف المخ الأيسر وتشمل معظم مناطق اللغة تسمى:", options: ["حبسة شاملة (كلية)", "حبسة بروكا", "حبسة فيرنيك", "حبسة التوصيل"], correct: 0 },
        { text: "أي من الآتي يتوافق مع 'السمة المميزة' في المدخل الفونولوجي للعلاج؟", options: ["تعلم سمة مميزة (مثل الانفجارية) تنتقل لأصوات أخرى", "علاج كل صوت على حدة", "الاعتماد على التدريب السمعي فقط", "إهمال التعميم"], correct: 0 }
    ];

    let selectedAnswers = new Array(50).fill(null);
    let lockedStatus = new Array(50).fill(false);
    const total = 50;

    const questionsDiv = document.getElementById('questionsArea');
    const answeredSpan = document.getElementById('answeredCounter');
    const liveScoreSpan = document.getElementById('liveScore');
    const finalEvalDiv = document.getElementById('finalEvaluation');

    function updateStats() {
        let answeredCount = 0;
        let correctCount = 0;
        for (let i = 0; i < total; i++) {
            if (lockedStatus[i]) {
                answeredCount++;
                if (selectedAnswers[i] !== null && selectedAnswers[i] === questions[i].correct) correctCount++;
            }
        }
        answeredSpan.innerText = `📋 تم الإجابة: ${answeredCount} / ${total}`;
        liveScoreSpan.innerText = `🏆 النتيجة: ${correctCount}`;

        if (answeredCount === total) {
            const percentage = (correctCount / total) * 100;
            let gradeMsg = "", advice = "";
            if (percentage >= 90) { gradeMsg = "🌟 عبقرية لغوية مطلقة!"; advice = "إلمامك استثنائي بكل تفاصيل الفصل الأول. أنت خبير حقيقي."; }
            else if (percentage >= 75) { gradeMsg = "📘 متقدم جداً لكن هناك خبايا"; advice = "ركز على النظريات الدماغية والمحكات الدقيقة وحبسات الكلام."; }
            else if (percentage >= 55) { gradeMsg = "⚠️ مستوى فوق المتوسط يحتاج تعزيزاً"; advice = "أعد دراسة مستويات اللغة والفترة الحرجة مرة ثانية بعمق."; }
            else { gradeMsg = "🔴 تحتاج مراجعة شاملة وقوية"; advice = "استرجاع الفصل الأول كاملاً مع التركيز على التعريفات والأقسام والحبسات."; }
            finalEvalDiv.style.display = "block";
            document.getElementById('finalGrade').innerHTML = `${correctCount}/${total} (${percentage.toFixed(1)}%)`;
            document.getElementById('finalMessage').innerHTML = `<strong>${gradeMsg}</strong><br>${advice}`;
        } else {
            finalEvalDiv.style.display = "none";
        }
    }

    function renderQuestions() {
        questionsDiv.innerHTML = '';
        for (let i = 0; i < total; i++) {
            const q = questions[i];
            const selected = selectedAnswers[i];
            const locked = lockedStatus[i];
            let feedbackHtml = '';
            if (locked) {
                if (selected === null) feedbackHtml = `<div class="feedback fb-wrong">⚠️ لم تختر إجابة</div>`;
                else if (selected === q.correct) feedbackHtml = `<div class="feedback fb-correct">✔️ إجابة صحيحة</div>`;
                else feedbackHtml = `<div class="feedback fb-wrong">❌ خطأ. الصحيح: ${q.options[q.correct]}</div>`;
            } else {
                feedbackHtml = `<div class="feedback fb-neutral">✨ اختر ثم اضغط Check</div>`;
            }

            let optsHtml = '';
            q.options.forEach((opt, idx) => {
                let isSelected = (selected === idx);
                let disabledClass = locked ? 'disabled-opt' : '';
                let selectedClass = isSelected ? 'selected' : '';
                optsHtml += `<li data-qidx="${i}" data-optidx="${idx}" class="${selectedClass} ${disabledClass}">${String.fromCharCode(65+idx)}. ${opt}</li>`;
            });

            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="q-header">
                    <span class="q-num">${i+1}</span>
                    <span class="q-text">${q.text}</span>
                </div>
                <ul class="options-list">
                    ${optsHtml}
                </ul>
                <div class="check-wrapper">
                    <button class="check-btn" data-idx="${i}">✓ check</button>
                    ${feedbackHtml}
                </div>
            `;
            questionsDiv.appendChild(card);
        }

        document.querySelectorAll('.options-list li').forEach(li => {
            li.addEventListener('click', (e) => {
                const qid = parseInt(li.dataset.qidx);
                const optid = parseInt(li.dataset.optidx);
                if (lockedStatus[qid]) return;
                selectedAnswers[qid] = optid;
                renderQuestions();
            });
        });

        document.querySelectorAll('.check-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const qid = parseInt(btn.dataset.idx);
                if (lockedStatus[qid]) return;
                lockedStatus[qid] = true;
                updateStats();
                renderQuestions();
            });
        });
    }

    function resetFullExam() {
        selectedAnswers = new Array(50).fill(null);
        lockedStatus = new Array(50).fill(false);
        updateStats();
        renderQuestions();
        finalEvalDiv.style.display = "none";
    }

    const themeBtn = document.getElementById('themeSwitcher');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('light');
        const isLight = document.body.classList.contains('light');
        themeBtn.innerHTML = isLight ? "🌙" : "☀️";
    });

    window.addEventListener('load', () => {
        resetFullExam();
        const resetBtn = document.getElementById('globalReset');
        if(resetBtn) resetBtn.addEventListener('click', resetFullExam);
    });
</script>
</body>
</html>
